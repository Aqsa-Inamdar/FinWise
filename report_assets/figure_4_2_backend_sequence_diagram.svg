<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10Z" fill="#111827"/>
    </marker>
    <marker id="returnArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2 2L10 6L2 10" fill="none" stroke="#111827" stroke-width="1.5"/>
    </marker>
  </defs>

  <rect width="1600" height="980" fill="white"/>

  <text x="800" y="52" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#111827">
    Backend Sequence Diagram of FinWise
  </text>
  <text x="800" y="82" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4B5563">
    Typical flow for dashboard, transactions, goal forecasting, and assistant requests
  </text>

  <!-- Participant boxes -->
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <rect x="70" y="120" width="170" height="56" rx="10" fill="#F9FAFB" stroke="#111827" stroke-width="2"/>
    <text x="155" y="155" font-size="22" font-weight="700" fill="#111827">User</text>

    <rect x="300" y="120" width="210" height="56" rx="10" fill="#EEF2FF" stroke="#111827" stroke-width="2"/>
    <text x="405" y="155" font-size="22" font-weight="700" fill="#111827">Frontend</text>

    <rect x="580" y="120" width="230" height="56" rx="10" fill="#DBEAFE" stroke="#111827" stroke-width="2"/>
    <text x="695" y="155" font-size="22" font-weight="700" fill="#111827">Backend API</text>

    <rect x="900" y="120" width="210" height="56" rx="10" fill="#ECFDF5" stroke="#111827" stroke-width="2"/>
    <text x="1005" y="155" font-size="22" font-weight="700" fill="#111827">Firebase Auth</text>

    <rect x="1180" y="120" width="200" height="56" rx="10" fill="#FEF3C7" stroke="#111827" stroke-width="2"/>
    <text x="1280" y="155" font-size="22" font-weight="700" fill="#111827">Firestore</text>

    <rect x="1430" y="120" width="110" height="56" rx="10" fill="#FCE7F3" stroke="#111827" stroke-width="2"/>
    <text x="1485" y="155" font-size="22" font-weight="700" fill="#111827">ML / AI</text>
  </g>

  <!-- Lifelines -->
  <g stroke="#6B7280" stroke-width="1.5" stroke-dasharray="8 8">
    <line x1="155" y1="176" x2="155" y2="860"/>
    <line x1="405" y1="176" x2="405" y2="860"/>
    <line x1="695" y1="176" x2="695" y2="860"/>
    <line x1="1005" y1="176" x2="1005" y2="860"/>
    <line x1="1280" y1="176" x2="1280" y2="860"/>
    <line x1="1485" y1="176" x2="1485" y2="860"/>
  </g>

  <!-- Activation bars -->
  <rect x="399" y="220" width="12" height="500" fill="#E5E7EB" stroke="#111827" stroke-width="1.3"/>
  <rect x="689" y="250" width="12" height="440" fill="#BFDBFE" stroke="#111827" stroke-width="1.3"/>
  <rect x="999" y="285" width="12" height="56" fill="#D1FAE5" stroke="#111827" stroke-width="1.3"/>
  <rect x="1274" y="390" width="12" height="205" fill="#FDE68A" stroke="#111827" stroke-width="1.3"/>
  <rect x="1479" y="505" width="12" height="86" fill="#FBCFE8" stroke="#111827" stroke-width="1.3"/>

  <!-- Messages -->
  <g stroke="#111827" stroke-width="2.1" font-family="Arial, sans-serif" fill="#111827" font-size="18">
    <line x1="155" y1="235" x2="405" y2="235" marker-end="url(#arrow)"/>
    <text x="280" y="223" text-anchor="middle" font-weight="500">1. User action</text>

    <line x1="405" y1="270" x2="695" y2="270" marker-end="url(#arrow)"/>
    <text x="550" y="258" text-anchor="middle" font-weight="500">2. API request</text>

    <line x1="695" y1="300" x2="1005" y2="300" marker-end="url(#arrow)"/>
    <text x="850" y="288" text-anchor="middle" font-weight="500">3. Verify token</text>

    <line x1="1005" y1="335" x2="695" y2="335" marker-end="url(#returnArrow)" stroke-dasharray="7 5"/>
    <text x="850" y="323" text-anchor="middle" font-weight="500">4. Auth result</text>

    <line x1="695" y1="405" x2="1280" y2="405" marker-end="url(#arrow)"/>
    <text x="987" y="393" text-anchor="middle" font-weight="500">5. Read or write user data</text>

    <line x1="1280" y1="440" x2="695" y2="440" marker-end="url(#returnArrow)" stroke-dasharray="7 5"/>
    <text x="987" y="428" text-anchor="middle" font-weight="500">6. Return records</text>

    <line x1="695" y1="520" x2="1485" y2="520" marker-end="url(#arrow)"/>
    <text x="1090" y="508" text-anchor="middle" font-weight="500">7. Invoke prediction or narration</text>

    <line x1="1485" y1="555" x2="695" y2="555" marker-end="url(#returnArrow)" stroke-dasharray="7 5"/>
    <text x="1090" y="543" text-anchor="middle" font-weight="500">8. Return computed result</text>

    <line x1="695" y1="640" x2="405" y2="640" marker-end="url(#returnArrow)" stroke-dasharray="7 5"/>
    <text x="550" y="628" text-anchor="middle" font-weight="500">9. JSON response</text>

    <line x1="405" y1="675" x2="155" y2="675" marker-end="url(#returnArrow)" stroke-dasharray="7 5"/>
    <text x="280" y="663" text-anchor="middle" font-weight="500">10. Updated interface</text>
  </g>

  <!-- Legend / notes -->
  <rect x="90" y="790" width="1420" height="110" rx="12" fill="#F9FAFB" stroke="#111827" stroke-width="1.6"/>
  <text x="120" y="827" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#111827">Typical operations:</text>
  <text x="120" y="857" font-family="Arial, sans-serif" font-size="18" fill="#374151">
    transaction updates, dashboard loading, PDF import, goal forecasting, assistant queries, and chat persistence.
  </text>
  <text x="120" y="885" font-family="Arial, sans-serif" font-size="18" fill="#374151">
    The backend remains the control layer between the frontend, authentication, data store, and ML / AI services.
  </text>
</svg>
