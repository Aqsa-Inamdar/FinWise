<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1000" fill="white"/>

  <text x="800" y="58" text-anchor="middle" font-family="Arial, sans-serif" font-size="36" font-weight="700" fill="black">
    FinWise Use Case Diagram
  </text>

  <!-- System boundary -->
  <rect x="360" y="115" width="1120" height="790" fill="white" stroke="black" stroke-width="3"/>
  <text x="920" y="160" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="black">
    FinWise System
  </text>

  <!-- Actor: User -->
  <circle cx="160" cy="360" r="48" fill="white" stroke="black" stroke-width="3"/>
  <line x1="160" y1="408" x2="160" y2="575" stroke="black" stroke-width="3"/>
  <line x1="80" y1="465" x2="240" y2="465" stroke="black" stroke-width="3"/>
  <line x1="160" y1="575" x2="90" y2="735" stroke="black" stroke-width="3"/>
  <line x1="160" y1="575" x2="230" y2="735" stroke="black" stroke-width="3"/>
  <text x="160" y="790" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="black">
    User
  </text>

  <!-- Use cases: left column -->
  <ellipse cx="660" cy="245" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="660" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    Login / Manage Account
  </text>

  <ellipse cx="660" cy="380" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="660" y="389" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    Manage Transactions
  </text>

  <ellipse cx="660" cy="515" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="660" y="524" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    Import PDF Statement
  </text>

  <ellipse cx="660" cy="650" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="660" y="659" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    View Dashboard
  </text>

  <!-- Use cases: right column -->
  <ellipse cx="1180" cy="310" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="1180" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    View Insights
  </text>

  <ellipse cx="1180" cy="460" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="1180" y="469" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    Manage Goals
  </text>

  <ellipse cx="1180" cy="610" rx="210" ry="58" fill="white" stroke="black" stroke-width="3"/>
  <text x="1180" y="619" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="black">
    Ask AI Assistant
  </text>

  <!-- Association lines -->
  <g stroke="black" stroke-width="2.6">
    <line x1="250" y1="380" x2="455" y2="255"/>
    <line x1="250" y1="415" x2="455" y2="380"/>
    <line x1="250" y1="450" x2="455" y2="515"/>
    <line x1="250" y1="485" x2="455" y2="650"/>
    <line x1="250" y1="425" x2="975" y2="310"/>
    <line x1="250" y1="460" x2="975" y2="460"/>
    <line x1="250" y1="495" x2="975" y2="610"/>
  </g>

  <!-- Detail note -->
  <rect x="430" y="750" width="975" height="95" fill="white" stroke="black" stroke-width="2"/>
  <text x="918" y="785" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="black">
    Note
  </text>
  <text x="918" y="820" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="black">
    Manage Transactions includes adding, editing, and deleting records.
  </text>
</svg>
